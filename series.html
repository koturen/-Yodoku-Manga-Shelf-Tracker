<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chi tiết bộ truyện — Yodoku</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="wrap" style="padding-top:28px;">
  <a href="index.html" class="back-link">&larr; Về trang chủ</a>
</div>

<div id="content">
  <div class="status-msg">Đang tải dữ liệu bộ truyện...</div>
</div>

<footer class="site-footer">Dữ liệu đồng bộ trực tiếp từ Google Sheet</footer>

<script src="config.js"></script>
<script src="data.js"></script>
<script>
  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str || "";
    return div.innerHTML;
  }

  function getSeriesId() {
    const params = new URLSearchParams(window.location.search);
    return params.get("id");
  }

  function statusLabel(status) {
    if (status === "ongoing") return "Đang ra";
    if (status === "completed") return "Hoàn thành";
    return status ? escapeHtml(status) : "";
  }

  function chapterGridHtml(chapters) {
    if (chapters.length === 0) {
      return `<div class="empty-state">Chưa có chương nào được thêm cho bộ truyện này.</div>`;
    }
    return `<div class="chapter-grid">` + chapters.map(c => `
      <a class="chapter-card" href="${c.url || '#'}" target="_blank" rel="noopener noreferrer">
        <span class="chapter-num">CHAP ${escapeHtml(c.number)}</span>
        <span class="chapter-title">${escapeHtml(c.title || ('Chương ' + c.number))}</span>
        ${c.date ? `<span class="chapter-date">${escapeHtml(c.date)}</span>` : ""}
      </a>
    `).join("") + `</div>`;
  }

  async function init() {
    const seriesId = getSeriesId();
    const content = document.getElementById("content");

    if (!seriesId) {
      content.innerHTML = `<div class="wrap"><div class="status-msg error">Thiếu ID bộ truyện trong đường dẫn.</div></div>`;
      return;
    }

    try {
      const [allSeries, allChapters] = await Promise.all([loadSeries(), loadChapters()]);
      const series = allSeries.find(s => s.id === seriesId);

      if (!series) {
        content.innerHTML = `<div class="wrap"><div class="status-msg error">Không tìm thấy bộ truyện với ID "${escapeHtml(seriesId)}".</div></div>`;
        return;
      }

      const chapters = allChapters.filter(c => c.seriesId === seriesId);

      content.innerHTML = `
        <div class="series-hero">
          <div class="book-cover">
            <img src="${series.cover}" alt="Bìa truyện ${escapeHtml(series.title)}"
                 onerror="this.src='https://placehold.co/400x600/1E1B27/C9C3B4?text=No+Cover'">
          </div>
          <div class="series-info">
            <h1>${escapeHtml(series.title)}</h1>
            <div class="series-tags">
              ${series.status ? `<span class="tag status-${escapeHtml(series.status)}">${statusLabel(series.status)}</span>` : ""}
              ${series.genre.map(g => `<span class="tag">${escapeHtml(g)}</span>`).join("")}
            </div>
            <p class="series-desc">${escapeHtml(series.description) || "Chưa có mô tả cho bộ truyện này."}</p>
            ${series.url ? `
              <a class="origin-link" href="${series.url}" target="_blank" rel="noopener noreferrer">
                Đọc tại trang gốc &nearr;
              </a>` : ""}
          </div>
        </div>

        <div class="wrap chapters-section">
          <h2>Danh sách chương (${chapters.length})</h2>
          ${chapterGridHtml(chapters)}
        </div>
      `;
    } catch (err) {
      content.innerHTML = `<div class="wrap"><div class="status-msg error">Không lấy được dữ liệu. Kiểm tra lại config.js và đảm bảo sheet đã Publish to web.</div></div>`;
      console.error(err);
    }
  }

  init();
</script>
</body>
</html>
