<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yodoku — Series</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="top">
  <div class="header-row">
    <div class="logo" id="logoSlot"></div>
    <div class="search-box">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="7"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
      <input type="text" id="searchInput" placeholder="Tìm bộ truyện theo tên...">
    </div>
    <button class="theme-toggle" id="themeToggle" title="Đổi giao diện">
      <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
      <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
    </button>
  </div>
  <p class="tagline-row" id="siteTagline"></p>
  <div class="filter-row" id="filterRow"></div>
  <div class="count-meta" id="countMeta"></div>
</header>

<main class="wrap">
  <div class="shelf" id="shelf">
    <div class="status-msg">Đang lấy dữ liệu từ Google Sheet...</div>
  </div>
</main>

<footer class="site-footer">Dữ liệu đồng bộ trực tiếp từ Google Sheet qua Apps Script</footer>

<script src="config.js"></script>
<script src="theme.js"></script>
<script src="data.js"></script>
<script>
  let ALL_SERIES = [];
  let activeStatus = null;
  let searchTerm = "";

  document.getElementById("siteTagline").textContent = CONFIG.SITE_TAGLINE;
  document.getElementById("logoSlot").innerHTML = CONFIG.LOGO_IMAGE_URL
    ? `<img src="${CONFIG.LOGO_IMAGE_URL}" alt="${escapeHtml(CONFIG.LOGO_TEXT)}">`
    : escapeHtml(CONFIG.LOGO_TEXT);

  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str || "";
    return div.innerHTML;
  }

  function renderFilters() {
    const row = document.getElementById("filterRow");
    const pills = [{ label: "Tất cả", cls: "" }, ...ALL_FILTERS];
    row.innerHTML = pills.map(p => `
      <button class="pill ${p.cls === activeStatus || (!activeStatus && p.cls === "") ? "active" : ""}"
              data-cls="${p.cls}">${p.label}</button>
    `).join("");

    row.querySelectorAll(".pill").forEach(btn => {
      btn.addEventListener("click", () => {
        activeStatus = btn.dataset.cls || null;
        renderFilters();
        render();
      });
    });
  }

  function shareUrl(id) {
    const url = `${location.origin}${location.pathname.replace("index.html", "")}series.html?id=${encodeURIComponent(id)}`;
    if (navigator.share) {
      navigator.share({ title: "Yodoku", url }).catch(() => {});
    } else {
      navigator.clipboard?.writeText(url);
      alert("Đã copy link chia sẻ!");
    }
  }
  window.shareUrl = shareUrl;

  function render() {
    const shelf = document.getElementById("shelf");
    let list = ALL_SERIES;

    if (activeStatus) list = list.filter(s => s.status.cls === activeStatus);
    if (searchTerm.trim()) {
      const q = searchTerm.trim().toLowerCase();
      list = list.filter(s => s.title.toLowerCase().includes(q));
    }

    document.getElementById("countMeta").textContent = `Hiện có ${list.length} / ${ALL_SERIES.length} bộ truyện`;

    if (list.length === 0) {
      shelf.innerHTML = `<div class="empty-state">Không tìm thấy bộ truyện nào khớp với tìm kiếm/bộ lọc.</div>`;
      return;
    }

    shelf.innerHTML = list.map(s => `
      <div class="book" onclick="location.href='series.html?id=${encodeURIComponent(s.id)}'">
        <div class="book-cover">
          <img src="${s.cover}" alt="Bìa truyện ${escapeHtml(s.title)}" loading="lazy"
               onerror="this.src='https://placehold.co/400x600/e7e5dd/6e6d66?text=No+Cover'">
          ${s.status.label ? `<span class="book-status-badge badge ${s.status.cls}">${escapeHtml(s.status.label)}</span>` : ""}
        </div>
        <div class="book-body">
          <div class="book-title">${escapeHtml(s.title)}</div>
          <div class="book-author">${escapeHtml(s.author)}</div>
          <div class="book-meta-row">
            <span>${s.totalVolumes ? escapeHtml(s.totalVolumes) + " Tập" : ""}</span>
            <span class="book-publisher">${[s.publisherVN, s.yearVN].filter(Boolean).map(escapeHtml).join(" / ")}</span>
          </div>
        </div>
        <div class="book-footer">
          <span class="book-price">${escapeHtml(formatPrice(s.price))}</span>
          <button class="share-btn" title="Chia sẻ" onclick="event.stopPropagation(); shareUrl('${s.id.replace(/'/g, "\\'")}')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>
          </button>
        </div>
      </div>
    `).join("");
  }

  document.getElementById("searchInput").addEventListener("input", (e) => {
    searchTerm = e.target.value;
    render();
  });

  async function init() {
    const shelf = document.getElementById("shelf");
    renderFilters();
    try {
      ALL_SERIES = await loadSeriesList();
      if (ALL_SERIES.length === 0) {
        shelf.innerHTML = `<div class="status-msg">Chưa có bộ truyện nào. Thêm tab mới trong Google Sheet và tải lại trang.</div>`;
        return;
      }
      render();
    } catch (err) {
      if (err.message === "MISSING_CONFIG") {
        shelf.innerHTML = `<div class="status-msg error">Chưa cấu hình Apps Script. Mở <code>config.js</code> và dán link Web App vào APPS_SCRIPT_URL.</div>`;
      } else {
        shelf.innerHTML = `<div class="status-msg error">Không lấy được dữ liệu. Kiểm tra lại link trong config.js và đảm bảo Apps Script đã Deploy với quyền "Anyone".</div>`;
      }
      console.error(err);
    }
  }

  init();
</script>
</body>
</html>
