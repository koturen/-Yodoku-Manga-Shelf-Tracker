<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>夜読 Yodoku — Kệ truyện của bạn</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="top">
  <div class="eyebrow">MANGA SHELF TRACKER</div>
  <h1 class="site-title" id="siteTitle">夜読 Yodoku</h1>
  <p class="tagline" id="siteTagline">Kệ truyện của riêng bạn.</p>

  <div class="search-row">
    <div class="search-box">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="7"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
      <input type="text" id="searchInput" placeholder="Tìm bộ truyện theo tên...">
    </div>
    <div class="genre-pills" id="genrePills"></div>
  </div>
  <div class="count-meta" id="countMeta"></div>
</header>

<main class="wrap">
  <div class="shelf" id="shelf">
    <div class="status-msg">Đang lấy dữ liệu từ Google Sheet...</div>
  </div>
</main>

<footer class="site-footer">Dữ liệu đồng bộ trực tiếp từ Google Sheet qua Apps Script</footer>

<script src="config.js"></script>
<script src="data.js"></script>
<script>
  let ALL_SERIES = [];
  let activeGenre = null;
  let searchTerm = "";

  document.getElementById("siteTitle").textContent = CONFIG.SITE_TITLE;
  document.getElementById("siteTagline").textContent = CONFIG.SITE_TAGLINE;

  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str || "";
    return div.innerHTML;
  }

  function statusLabel(status) {
    const s = (status || "").toLowerCase();
    if (s.includes("on-going") || s.includes("ongoing") || s.includes("đang")) return "Đang ra";
    if (s.includes("end") || s.includes("hoàn")) return "Hoàn thành";
    return status || "";
  }

  function statusClass(status) {
    const s = (status || "").toLowerCase();
    if (s.includes("on-going") || s.includes("ongoing") || s.includes("đang")) return "status-ongoing";
    if (s.includes("end") || s.includes("hoàn")) return "status-completed";
    return "";
  }

  function render() {
    const shelf = document.getElementById("shelf");
    let list = ALL_SERIES;

    if (activeGenre) list = list.filter(s => s.genre.includes(activeGenre));
    if (searchTerm.trim()) {
      const q = searchTerm.trim().toLowerCase();
      list = list.filter(s => s.title.toLowerCase().includes(q));
    }

    document.getElementById("countMeta").textContent = `${list.length} / ${ALL_SERIES.length} bộ truyện`;

    if (list.length === 0) {
      shelf.innerHTML = `<div class="empty-state">Không tìm thấy bộ truyện nào khớp với tìm kiếm của bạn.</div>`;
      return;
    }

    shelf.innerHTML = list.map(s => `
      <a class="book" href="series.html?id=${encodeURIComponent(s.id)}">
        <div class="book-cover">
          <img src="${s.cover}" alt="Bìa truyện ${escapeHtml(s.title)}" loading="lazy"
               onerror="this.src='https://placehold.co/400x600/1E1B27/C9C3B4?text=No+Cover'">
          ${s.status ? `<div class="book-badge">${escapeHtml(statusLabel(s.status))}</div>` : ""}
        </div>
        <div class="book-title">${escapeHtml(s.title)}</div>
        <div class="book-meta">${s.genre.slice(0, 2).join(" · ")}${s.volumeCount ? ` · ${s.volumeCount} tập` : ""}</div>
      </a>
    `).join("");
  }

  function renderPills() {
    const genreSet = new Set();
    ALL_SERIES.forEach(s => s.genre.forEach(g => g && genreSet.add(g)));
    const pillsEl = document.getElementById("genrePills");
    const genres = Array.from(genreSet).sort();
    pillsEl.innerHTML = [`<button class="pill active" data-genre="">Tất cả</button>`]
      .concat(genres.map(g => `<button class="pill" data-genre="${escapeHtml(g)}">${escapeHtml(g)}</button>`))
      .join("");

    pillsEl.querySelectorAll(".pill").forEach(btn => {
      btn.addEventListener("click", () => {
        pillsEl.querySelectorAll(".pill").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        activeGenre = btn.dataset.genre || null;
        render();
      });
    });
  }

  document.getElementById("searchInput").addEventListener("input", (e) => {
    searchTerm = e.target.value;
    render();
  });

  async function init() {
    const shelf = document.getElementById("shelf");
    try {
      ALL_SERIES = await loadSeriesList();
      if (ALL_SERIES.length === 0) {
        shelf.innerHTML = `<div class="status-msg">Chưa có bộ truyện nào. Thêm tab mới trong Google Sheet và tải lại trang.</div>`;
        return;
      }
      renderPills();
      render();
    } catch (err) {
      if (err.message === "MISSING_CONFIG") {
        shelf.innerHTML = `<div class="status-msg error">Chưa cấu hình Apps Script. Mở <code>config.js</code> và dán link Web App vào APPS_SCRIPT_URL.</div>`;
      } else {
        shelf.innerHTML = `<div class="status-msg error">Không lấy được dữ liệu. Kiểm tra lại link trong config.js và đảm bảo Apps Script đã Deploy với quyền "Anyone".</div>`;
      }
      console.error(err);
    }
  }

  init();
</script>
</body>
</html>
